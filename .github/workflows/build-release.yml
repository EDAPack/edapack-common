name: edapack build-release

# Reusable workflow: resolve inputs -> change-gate -> build matrix -> publish.
# Each tool repo calls this from a thin ci.yml. The shared scripts are delivered
# via ivpm (edapack-common is an ivpm dependency of each tool, fetched into
# packages/edapack-common), and builds run in the STOCK manylinux images
# (quay.io/pypa/*) installing their deps at build time — no custom images.
# See https://edapack.github.io (Developer Guide → releasing).
on:
  workflow_call:
    inputs:
      package:
        description: "Package name, e.g. verilator-bin"
        required: true
        type: string
      images:
        description: 'Simple x86_64 docker matrix: JSON array of manylinux short-names, e.g. ["manylinux_2_28_x86_64"]'
        required: false
        type: string
        default: "[]"
      targets:
        description: >
          Rich build matrix (overrides `images`): JSON array of objects
          {name, runs-on, kind: docker|native, image?}. Use for aarch64
          (kind=docker on an arm runner) and macOS (kind=native). Example:
          [{"name":"manylinux_2_28_x86_64","runs-on":"ubuntu-latest","kind":"docker","image":"quay.io/pypa/manylinux_2_28_x86_64"},
           {"name":"manylinux_2_28_aarch64","runs-on":"ubuntu-24.04-arm","kind":"docker","image":"quay.io/pypa/manylinux_2_28_aarch64"},
           {"name":"macos-arm64","runs-on":"macos-14","kind":"native"}]
        required: false
        type: string
        default: ""
      core_ref:
        description: "Override core input ref (tag/branch/sha)"
        required: false
        type: string
        default: ""
      input_overrides:
        description: "JSON map of dependency name -> ref"
        required: false
        type: string
        default: "{}"
      force:
        description: "Build even if inputs unchanged"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the release as prerelease"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------- #
  # resolve: fetch edapack-common (via ivpm), resolve input versions, and
  # decide whether a release is needed by diffing the last published manifest.
  # --------------------------------------------------------------------- #
  resolve:
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.gate.outputs.build_needed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changed_summary: ${{ steps.gate.outputs.changed_summary }}
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build matrix
        id: targets
        env:
          TARGETS_IN: ${{ inputs.targets }}
          IMAGES_IN: ${{ inputs.images }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          t = (os.environ.get("TARGETS_IN") or "").strip()
          if t and t != "[]":
              targets = json.loads(t)
          else:
              imgs = json.loads(os.environ.get("IMAGES_IN") or "[]")
              targets = [{"name": i, "runs-on": "ubuntu-latest",
                          "kind": "docker", "image": f"quay.io/pypa/{i}"} for i in imgs]
          assert targets, "no build targets: set `images` or `targets`"
          print("targets=" + json.dumps(targets))
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch edapack-common via ivpm
        run: |
          pip install ivpm
          ivpm update -a --skip-py-install
          test -f packages/edapack-common/scripts/resolve-inputs.py

      - name: Resolve inputs
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EC=packages/edapack-common
          overrides_args=()
          [ -n "${{ inputs.core_ref }}" ] && overrides_args+=(--core-ref "${{ inputs.core_ref }}")
          python3 "$EC/scripts/resolve-inputs.py" \
            --build-inputs build-inputs.yaml \
            --recipe-sha "$(git rev-parse HEAD)" \
            --overrides-json '${{ inputs.input_overrides }}' \
            "${overrides_args[@]}" \
            --output candidate.json
          cat candidate.json

      - name: Fetch last release manifest
        id: prev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view --repo "${{ github.repository }}" --json tagName -q .tagName >/dev/null 2>&1; then
            gh release download --repo "${{ github.repository }}" --pattern manifest.json --dir prev || true
          fi
          [ -f prev/manifest.json ] && echo "previous=prev/manifest.json" >> "$GITHUB_OUTPUT" || echo "previous=none" >> "$GITHUB_OUTPUT"

      - name: Change gate
        id: gate
        run: |
          EC=packages/edapack-common
          pinned=""; [ -n "${{ inputs.core_ref }}" ] || [ "${{ inputs.input_overrides }}" != "{}" ] && pinned="--pinned"
          force="";  [ "${{ inputs.force }}" = "true" ] && force="--force"
          python3 "$EC/scripts/manifest-diff.py" \
            --candidate candidate.json \
            --previous "${{ steps.prev.outputs.previous }}" \
            --trigger "${{ github.event_name == 'schedule' && 'schedule' || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || 'push') }}" \
            $force $pinned \
            --github-output "$GITHUB_OUTPUT"

      - name: Compute version
        id: version
        run: |
          core_ver="$(python3 -c 'import json; d=json.load(open("candidate.json")); print(next(i["version"] or "0" for i in d["inputs"] if i["role"]=="core"))')"
          version="${core_ver}.$(date -u +%Y%m%d)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Upload candidate
        if: steps.gate.outputs.build_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: candidate
          path: candidate.json

  # --------------------------------------------------------------------- #
  # build: one job per target. Linux targets (kind=docker) `docker run` the
  # stock quay.io/pypa image (deps installed at build time) — on x86_64 (ubuntu-
  # latest) or aarch64 (an arm runner). macOS targets (kind=native) run build.sh
  # directly on the runner. We `docker run` rather than `container:` because
  # actions' node20 needs glibc >= 2.28 and would fail inside manylinux2014.
  # --------------------------------------------------------------------- #
  build:
    needs: resolve
    if: needs.resolve.outputs.build_needed == 'true'
    runs-on: ${{ matrix.target.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch edapack-common via ivpm
        run: |
          pip install ivpm
          ivpm update -a --skip-py-install
          test -f packages/edapack-common/scripts/build-common.sh

      - uses: actions/download-artifact@v4
        with:
          name: candidate

      - name: Build (docker — Linux manylinux)
        if: matrix.target.kind == 'docker'
        env:
          EC_PACKAGE: ${{ inputs.package }}
          EC_VERSION: ${{ needs.resolve.outputs.version }}
          EC_TAG: ${{ needs.resolve.outputs.tag }}
          EC_TRIGGER: ${{ github.event_name == 'schedule' && 'schedule' || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || 'push') }}
          EC_IMAGE_NAME: ${{ matrix.target.name }}
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$PWD:/src" \
            -e SRC_DIR=/src -e WORK_DIR=/tmp/ecwork -e OUT_DIR=/src/dist \
            -e EC_COMMON=/src/packages/edapack-common \
            -e EC_INSTALL_DEPS=1 \
            -e CANDIDATE_JSON=/src/candidate.json \
            -e EC_PACKAGE -e EC_VERSION -e EC_TAG -e EC_TRIGGER -e EC_IMAGE_NAME \
            -e EC_RECIPE_SHA="$(git rev-parse HEAD)" \
            -e core_ref="${{ inputs.core_ref }}" \
            -e input_overrides='${{ inputs.input_overrides }}' \
            "${{ matrix.target.image }}" \
            bash /src/scripts/build.sh
          ls -l dist/

      - name: Provision macOS deps
        if: matrix.target.kind == 'native' && runner.os == 'macOS'
        run: |
          brew install autoconf automake flex bison cmake ninja help2man gmp mpfr || true
          pip3 install meson ninja --break-system-packages || pip3 install meson ninja || true

      - name: Build (native — macOS)
        if: matrix.target.kind == 'native'
        env:
          EC_PACKAGE: ${{ inputs.package }}
          EC_VERSION: ${{ needs.resolve.outputs.version }}
          EC_TAG: ${{ needs.resolve.outputs.tag }}
          EC_TRIGGER: ${{ github.event_name == 'schedule' && 'schedule' || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || 'push') }}
          EC_IMAGE_NAME: ${{ matrix.target.name }}
          core_ref: ${{ inputs.core_ref }}
          input_overrides: ${{ inputs.input_overrides }}
        run: |
          mkdir -p dist
          export SRC_DIR="$PWD" WORK_DIR="$RUNNER_TEMP/ecwork" OUT_DIR="$PWD/dist"
          export EC_COMMON="$PWD/packages/edapack-common"
          export CANDIDATE_JSON="$PWD/candidate.json"
          export EC_RECIPE_SHA="$(git rev-parse HEAD)"
          # PATH for keg-only brew flex/bison
          export PATH="$(brew --prefix bison 2>/dev/null)/bin:$(brew --prefix flex 2>/dev/null)/bin:$PATH"
          bash scripts/build.sh
          ls -l dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: dist/

  # --------------------------------------------------------------------- #
  # publish: merge per-platform manifests, create the release, upload assets.
  # --------------------------------------------------------------------- #
  publish:
    needs: [resolve, build]
    if: needs.resolve.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch edapack-common via ivpm
        run: |
          pip install ivpm
          ivpm update -a --skip-py-install
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge manifests
        run: |
          manifests=$(find artifacts -name 'manifest-*.json' -print)
          python3 packages/edapack-common/scripts/gen-manifest.py merge \
            $(for m in $manifests; do echo --manifest "$m"; done) \
            --output manifest.json
          mkdir -p upload
          find artifacts -name '*.tar.gz' -exec cp {} upload/ \;
          find artifacts -name '*.sha256' -exec cp {} upload/ \;
          cp manifest.json upload/
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="$(mktemp)"
          {
            echo "Automated build of ${{ inputs.package }} ${{ needs.resolve.outputs.version }}."
            echo; echo "### Input changes since last release"; echo
            echo "${{ needs.resolve.outputs.changed_summary }}"
          } > "$notes"
          flags=""; [ "${{ inputs.prerelease }}" = "true" ] && flags="--prerelease"
          gh release create "${{ needs.resolve.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.package }} ${{ needs.resolve.outputs.version }}" \
            --notes-file "$notes" $flags \
            upload/*
