name: builder-images

# Build & push the rootless manylinux builder images used by every tool's
# build. Weekly refresh (picks up base-image security updates) plus on changes
# to the Dockerfile.
on:
  push:
    paths:
      - docker/**
      - .github/workflows/builder-images.yml
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC (ahead of the Sunday tool builds)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - manylinux_2_28_x86_64
          - manylinux_2_34_x86_64
          - manylinux2014_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute date tag
        id: tag
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          build-args: |
            BASE_IMAGE=quay.io/pypa/${{ matrix.image }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.tag.outputs.date }}
